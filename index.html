<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alizée Monnier · Yoga</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#ebe1d0;
  --burgundy:#8f4333;
  --green:#687257;
  --grey:#383837;
  --cream-dark:#d6c9b3;
  --burgundy-light:#b5695a;
  --font:'Fraunces',Georgia,serif;
}
body{font-family:var(--font);background:var(--cream);color:var(--grey);min-height:100vh}

/* ─── HEADER ─── */
header{background:var(--burgundy);padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:1rem}
.logo-img{width:56px;height:56px;object-fit:contain;border-radius:6px}
.logo-text{color:var(--cream);font-size:1.4rem;font-weight:300;letter-spacing:.04em}
.logo-text span{font-style:italic}
nav a{color:var(--cream);text-decoration:none;font-size:.9rem;letter-spacing:.08em;opacity:.8;transition:opacity .2s}
nav a:hover{opacity:1}
.admin-btn{background:transparent;border:1px solid rgba(235,225,208,.4);color:var(--cream);padding:.4rem 1rem;border-radius:2rem;font-family:var(--font);font-size:.85rem;cursor:pointer;transition:all .2s}
.admin-btn:hover{background:rgba(235,225,208,.15)}

/* ─── HERO ─── */
.hero{background:var(--burgundy);padding:2.5rem 2rem 3rem;text-align:center;color:var(--cream)}
.hero h1{font-size:2.8rem;font-weight:300;font-style:italic;margin-bottom:.5rem}
.hero p{opacity:.75;font-size:1rem;letter-spacing:.08em}
.disciplines{display:flex;gap:1rem;justify-content:center;margin-top:1.2rem;flex-wrap:wrap}
.disc-tag{background:rgba(235,225,208,.15);border:1px solid rgba(235,225,208,.3);color:var(--cream);padding:.3rem .9rem;border-radius:2rem;font-size:.8rem;letter-spacing:.06em}

/* ─── CALENDAR ─── */
.cal-section{padding:2rem;max-width:1100px;margin:0 auto}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.cal-nav h2{font-size:1.6rem;font-weight:300;font-style:italic;color:var(--burgundy);text-transform:capitalize}
.nav-arrow{background:none;border:1.5px solid var(--burgundy);color:var(--burgundy);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-arrow:hover{background:var(--burgundy);color:var(--cream)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--cream-dark);border-radius:12px;overflow:hidden}
.cal-day-header{background:var(--burgundy);color:var(--cream);text-align:center;padding:.5rem;font-size:.75rem;letter-spacing:.1em;font-weight:400}
.cal-day{background:var(--cream);min-height:90px;padding:.4rem;position:relative;transition:background .15s}
.cal-day.empty{background:#e8dac6;opacity:.5}
.cal-day.today{background:#f5ede0}
.cal-day.today::after{content:'';position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--burgundy);border-radius:50%}
.day-num{font-size:.75rem;color:var(--grey);opacity:.5;margin-bottom:.3rem}
.cal-day.today .day-num{color:var(--burgundy);opacity:1;font-weight:600}

/* ─── SESSION CARD ─── */
.session-chip{background:var(--green);color:var(--cream);border-radius:6px;padding:.25rem .4rem;margin-bottom:.2rem;font-size:.7rem;cursor:pointer;transition:all .2s;line-height:1.3}
.session-chip:hover{background:var(--burgundy);transform:scale(1.02)}
.session-chip.full{background:var(--grey);opacity:.6;cursor:default}
.session-chip.full:hover{transform:none}
.chip-time{font-weight:600;font-size:.68rem;display:block}
.chip-spots{opacity:.85;font-size:.65rem}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(56,56,55,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.active{opacity:1;pointer-events:all}
.modal{background:var(--cream);border-radius:16px;max-width:520px;width:100%;padding:2rem;position:relative;transform:translateY(20px);transition:transform .25s}
.overlay.active .modal{transform:translateY(0)}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--grey);opacity:.5;transition:opacity .2s;line-height:1}
.modal-close:hover{opacity:1}
.modal h3{font-size:1.5rem;font-weight:300;font-style:italic;color:var(--burgundy);margin-bottom:.3rem}
.modal-meta{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.2rem;margin-top:.6rem}
.meta-tag{background:rgba(143,67,51,.1);color:var(--burgundy);padding:.2rem .7rem;border-radius:2rem;font-size:.78rem}
.gmaps-link{text-decoration:none;background:rgba(104,114,87,.12);color:var(--green) !important;transition:background .2s}
.gmaps-link:hover{background:rgba(104,114,87,.25)}
.spots-bar{background:var(--cream-dark);border-radius:4px;height:6px;margin-bottom:1.2rem;overflow:hidden}
.spots-fill{background:var(--green);height:100%;border-radius:4px;transition:width .4s}
.spots-fill.warning{background:#c8842a}
.spots-fill.danger{background:var(--burgundy)}
.spots-text{font-size:.8rem;color:var(--grey);opacity:.7;margin-top:.3rem;margin-bottom:1rem}

/* ─── FORM ─── */
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.82rem;letter-spacing:.06em;margin-bottom:.3rem;color:var(--grey);opacity:.75}
.form-group input{width:100%;padding:.65rem .9rem;border:1.5px solid var(--cream-dark);border-radius:8px;font-family:var(--font);font-size:.95rem;background:white;color:var(--grey);transition:border-color .2s;outline:none}
.form-group input:focus{border-color:var(--burgundy)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.btn-primary{width:100%;padding:.85rem;background:var(--burgundy);color:var(--cream);border:none;border-radius:8px;font-family:var(--font);font-size:1rem;font-style:italic;cursor:pointer;transition:all .2s;margin-top:.5rem}
.btn-primary:hover{background:#7a3628}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.full-badge{background:var(--grey);color:var(--cream);text-align:center;padding:.85rem;border-radius:8px;font-size:.9rem;letter-spacing:.05em;opacity:.7;margin-top:.5rem}

/* ─── SUCCESS ─── */
.success-state{text-align:center;padding:1rem 0}
.success-icon{width:56px;height:56px;background:rgba(104,114,87,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem}
.success-state h3{color:var(--green);font-style:italic;font-weight:300;font-size:1.4rem;margin-bottom:.5rem}
.success-state p{font-size:.9rem;color:var(--grey);opacity:.75;line-height:1.6}

/* ─── ADMIN ─── */
.admin-overlay{position:fixed;inset:0;background:rgba(56,56,55,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s}
.admin-overlay.active{opacity:1;pointer-events:all}
.admin-panel{background:var(--cream);border-radius:16px;max-width:600px;width:100%;padding:2rem;position:relative;max-height:90vh;overflow-y:auto}
.admin-panel h2{font-size:1.6rem;font-weight:300;font-style:italic;color:var(--burgundy);margin-bottom:1.5rem;display:flex;align-items:center;gap:.5rem}
.admin-section{background:white;border-radius:10px;padding:1.2rem;margin-bottom:1.2rem;border:1px solid var(--cream-dark)}
.admin-section h4{font-size:.85rem;letter-spacing:.1em;color:var(--green);margin-bottom:1rem;text-transform:uppercase}
.session-list-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--cream-dark);font-size:.85rem}
.session-list-item:last-child{border-bottom:none}
.del-btn{background:none;border:none;color:var(--burgundy);cursor:pointer;font-size:.9rem;opacity:.6;transition:opacity .2s}
.del-btn:hover{opacity:1}
.login-form{max-width:340px;margin:0 auto;text-align:center}
.login-form h3{font-style:italic;color:var(--burgundy);margin-bottom:1.5rem;font-weight:300;font-size:1.4rem}
.login-err{color:var(--burgundy);font-size:.85rem;margin-top:.5rem;min-height:1.2em}
.emailjs-note{background:rgba(104,114,87,.1);border:1px solid rgba(104,114,87,.3);border-radius:8px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.8rem;color:var(--green);line-height:1.5}

/* ─── FOOTER ─── */
footer{background:var(--grey);color:var(--cream);text-align:center;padding:2rem;margin-top:3rem;font-size:.85rem;opacity:.9}
footer a{color:var(--cream);text-decoration:none;border-bottom:1px solid rgba(235,225,208,.3)}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:var(--cream);padding:.8rem 1.6rem;border-radius:2rem;font-size:.9rem;z-index:500;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--burgundy)}

/* ─── WEEK VIEW (mobile) ─── */
.week-nav{display:none;align-items:center;justify-content:space-between;margin-bottom:1rem}
.week-nav h3{font-size:1rem;font-style:italic;color:var(--burgundy);text-align:center;flex:1}
.week-grid{display:none;flex-direction:column;gap:10px}
.week-day-block{background:white;border-radius:10px;overflow:hidden;border:1px solid var(--cream-dark)}
.week-day-header{background:var(--burgundy);color:var(--cream);padding:.45rem 1rem;font-size:.85rem;display:flex;align-items:center;justify-content:space-between}
.week-day-header.today-header{background:var(--green)}
.week-day-date{font-size:.75rem;opacity:.75}
.week-day-sessions{padding:.5rem .75rem}
.week-session-card{background:var(--green);color:var(--cream);border-radius:8px;padding:.6rem .8rem;margin-bottom:.4rem;cursor:pointer;transition:background .2s}
.week-session-card:hover{background:var(--burgundy)}
.week-session-card.full{background:var(--grey);opacity:.6;cursor:default}
.week-session-card.full:hover{background:var(--grey)}
.wsc-type{font-size:.9rem;font-weight:600}
.wsc-meta{font-size:.75rem;opacity:.85;margin-top:.15rem}
.week-empty{font-size:.8rem;color:var(--grey);opacity:.4;padding:.4rem 0;font-style:italic}

@media(max-width:700px){
  .cal-nav{display:none}
  .cal-grid{display:none}
  .week-nav{display:flex}
  .week-grid{display:flex}
  .hero h1{font-size:1.8rem}
  .form-row{grid-template-columns:1fr}
  .cal-section{padding:1rem}
  .modal{padding:1.2rem}
}
</style>
</head>

/* ════════════════════════════════
   UTILITAIRES DATE
═══════════════════════════════════ */
function formatDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function parseDate(str){const [y,m,d]=str.split('-');return new Date(y,m-1,d);}

/* ════════════════════════════════
   CALENDRIER
═══════════════════════════════════ */
const FR_MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const FR_DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

function changeMonth(dir){
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+dir, 1);
  renderCalendar();
}

function renderCalendar(){
  const year=currentDate.getFullYear(), month=currentDate.getMonth();
  document.getElementById('month-title').textContent = FR_MONTHS[month]+' '+year;
  const grid=document.getElementById('calendar-grid');
  grid.innerHTML='';

  FR_DAYS.forEach(d=>{
    const h=document.createElement('div');
    h.className='cal-day-header';h.textContent=d;grid.appendChild(h);
  });

  const firstDay=new Date(year,month,1);
  let startDow=(firstDay.getDay()+6)%7; // lundi=0
  for(let i=0;i<startDow;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}

  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=formatDate(new Date());

  for(let d=1;d<=daysInMonth;d++){
    const cell=document.createElement('div');
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cell.className='cal-day'+(dateStr===today?' today':'');

    const numEl=document.createElement('div');numEl.className='day-num';numEl.textContent=d;
    cell.appendChild(numEl);

    const daySessions=sessions.filter(s=>s.date===dateStr);
    daySessions.forEach(s=>{
      const chip=document.createElement('div');
      const isFull=s.registrations.length>=s.maxParticipants;
      chip.className='session-chip'+(isFull?' full':'');
      chip.innerHTML=`<span class="chip-time">${s.time} · ${s.type}</span><span class="chip-spots">${s.registrations.length}/${s.maxParticipants}</span>`;
      if(!isFull) chip.onclick=()=>openBooking(s.id);
      else chip.title='Complet';
      cell.appendChild(chip);
    });
    grid.appendChild(cell);
  }
}

let currentSessionId=null;

function openBooking(sessionId){
  currentSessionId=sessionId;
  const s=sessions.find(x=>x.id===sessionId);
  if(!s)return;
  renderBookingModal(s);
  document.getElementById('booking-overlay').classList.add('active');
}

function renderBookingModal(s){
  const isFull=s.registrations.length>=s.maxParticipants;
  const pct=Math.round(s.registrations.length/s.maxParticipants*100);
  const fillClass=pct>=100?'danger':pct>=70?'warning':'';
  const dateObj=parseDate(s.date);
  const dateFormatted=dateObj.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  document.getElementById('modal-content').innerHTML=`
    <h3>${s.type}</h3>
    <div class="modal-meta">
      <span class="meta-tag">📅 ${dateFormatted}</span>
      <span class="meta-tag">⏰ ${s.time}</span>
      <span class="meta-tag">📍 ${s.lieu}</span>
      ${s.gmaps ? `<a class="meta-tag gmaps-link" href="${s.gmaps}" target="_blank" rel="noopener">🗺 Voir sur Google Maps</a>` : ''}
    </div>
    <div class="spots-bar"><div class="spots-fill ${fillClass}" style="width:${Math.min(pct,100)}%"></div></div>
    <div class="spots-text">${s.registrations.length} / ${s.maxParticipants} participant${s.registrations.length>1?'s':''} inscrit${s.registrations.length>1?'s':''}</div>
    ${isFull ? `<div class="full-badge">🙏 Cette session est complète</div>` : `
    <div class="form-row">
      <div class="form-group"><label>Prénom *</label><input type="text" id="f-prenom" placeholder="Marie" required/></div>
      <div class="form-group"><label>Nom *</label><input type="text" id="f-nom" placeholder="Dupont" required/></div>
    </div>
    <div class="form-group"><label>Adresse e-mail *</label><input type="email" id="f-email" placeholder="marie@exemple.fr" required/></div>
    <div class="form-group"><label>Téléphone *</label><input type="tel" id="f-tel" placeholder="06 00 00 00 00" required/></div>
    <button class="btn-primary" id="submit-btn" onclick="submitBooking('${s.id}')">Confirmer mon inscription</button>
    `}
  `;
}

function closeBooking(e){if(e.target===document.getElementById('booking-overlay'))closeBookingDirect();}
function closeBookingDirect(){document.getElementById('booking-overlay').classList.remove('active');}

async function submitBooking(sessionId){
  const prenom=document.getElementById('f-prenom').value.trim();
  const nom=document.getElementById('f-nom').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const tel=document.getElementById('f-tel').value.trim();

  if(!prenom||!nom||!email||!tel){showToast('Merci de remplir tous les champs','error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showToast('Adresse e-mail invalide','error');return;}

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Inscription en cours…';

  const s=sessions.find(x=>x.id===sessionId);
  if(s.registrations.length>=s.maxParticipants){showToast('Session complète','error');return;}

  s.registrations.push({nom,prenom,email,tel});
  saveSessions();

  const dateObj=parseDate(s.date);
  const dateFormatted=dateObj.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // EmailJS — envoi des mails
  try{
    emailjs.init(CONFIG.emailjsPublicKey);

    // Mail au client
    await emailjs.send(CONFIG.emailjsServiceId, CONFIG.emailjsTemplateClient, {
      to_email: email,
      to_name: `${prenom} ${nom}`,
      session_type: s.type,
      session_date: dateFormatted,
      session_time: s.time,
      session_lieu: s.lieu,
    });

    // Mail à la gérante
    await emailjs.send(CONFIG.emailjsServiceId, CONFIG.emailjsTemplateOwner, {
      to_email: CONFIG.ownerEmail,
      client_prenom: prenom,
      client_nom: nom,
      client_email: email,
      client_tel: tel,
      session_type: s.type,
      session_date: dateFormatted,
      session_time: s.time,
      session_lieu: s.lieu,
      spots_taken: s.registrations.length,
      spots_max: s.maxParticipants,
    });
  }catch(err){
    console.warn('EmailJS non configuré ou erreur:', err);
  }

  renderCalendar();

  document.getElementById('modal-content').innerHTML=`
    <div class="success-state">
      <div class="success-icon">🙏</div>
      <h3>Inscription confirmée !</h3>
      <p>Bonjour <strong>${prenom}</strong>, votre inscription est bien enregistrée.<br/><br/>
      <strong>${s.type}</strong><br/>
      ${dateFormatted} à ${s.time}<br/>
      ${s.lieu}<br/><br/>
      Un e-mail de confirmation vous a été envoyé à <strong>${email}</strong>.</p>
      <button class="btn-primary" style="margin-top:1.5rem" onclick="closeBookingDirect()">Fermer</button>
    </div>
  `;
}

/* ════════════════════════════════
   ESPACE ADMIN
═══════════════════════════════════ */
function openAdmin(){
  document.getElementById('admin-overlay').classList.add('active');
  renderAdminContent();
}
function closeAdmin(e){if(e.target===document.getElementById('admin-overlay'))document.getElementById('admin-overlay').classList.remove('active');}
function closeAdminDirect(){document.getElementById('admin-overlay').classList.remove('active');}

function renderAdminContent(){
  const panel=document.getElementById('admin-content');
  if(!adminLoggedIn){
    panel.innerHTML=`
      <button class="modal-close" onclick="closeAdminDirect()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#383837;opacity:.5">&#215;</button>
      <div class="login-form">
        <svg viewBox="0 0 80 80" width="60" height="60" style="margin:0 auto 1rem;display:block">
          <circle cx="40" cy="40" r="38" fill="none" stroke="#8f4333" stroke-width="3"/>
          <text x="40" y="52" text-anchor="middle" font-family="Fraunces,serif" font-size="28" fill="#8f4333" font-style="italic">AM</text>
        </svg>
        <h3>Espace réservé</h3>
        <div class="form-group" style="text-align:left"><label>Mot de passe</label>
          <input type="password" id="admin-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkAdminLogin()"/>
        </div>
        <button class="btn-primary" onclick="checkAdminLogin()">Connexion</button>
        <div class="login-err" id="login-err"></div>
      </div>
    `;
    return;
  }
  renderAdminPanel(panel);
}

function checkAdminLogin(){
  const pw=document.getElementById('admin-pw').value;
  if(pw===CONFIG.adminPassword){adminLoggedIn=true;renderAdminContent();}
  else document.getElementById('login-err').textContent='Mot de passe incorrect.';
}

function renderAdminPanel(panel){
  const sorted=[...sessions].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  panel.innerHTML=`
    <button class="modal-close" onclick="closeAdminDirect();adminLoggedIn=false;" style="position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#383837;opacity:.5">&#215;</button>
    <h2>🌿 Espace admin</h2>
    
    <div class="emailjs-note">
      ⚙️ <strong>Configuration EmailJS requise</strong> : pour activer les e-mails automatiques, renseignez vos clés EmailJS dans la variable CONFIG en haut du code source (emailjsPublicKey, emailjsServiceId, etc.). Rendez-vous sur <a href="https://www.emailjs.com" target="_blank">emailjs.com</a> pour créer vos templates.
    </div>

    <div class="admin-section">
      <h4>Ajouter une session</h4>
      <div class="form-row">
        <div class="form-group"><label>Type de séance</label>
          <input type="text" id="a-type" placeholder="Hatha Yoga, Méditation…" list="types-list"/>
          <datalist id="types-list">
            <option value="Hatha Yoga"/><option value="Yoga Asana"/><option value="Méditation"/>
            <option value="Pranayama"/><option value="Chants & Mantras"/>
          </datalist>
        </div>
        <div class="form-group"><label>Nombre max de participants</label>
          <input type="number" id="a-max" min="1" max="50" value="10"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date</label><input type="date" id="a-date"/></div>
        <div class="form-group"><label>Heure</label><input type="time" id="a-time" value="09:00"/></div>
      </div>
      <div class="form-group"><label>Lieu</label>
        <input type="text" id="a-lieu" placeholder="Studio La Confluence, Lyon 2"/>
      </div>
      <div class="form-group"><label>Lien Google Maps (optionnel)</label>
        <input type="url" id="a-gmaps" placeholder="https://maps.google.com/?q=..."/>
      </div>
      <button class="btn-primary" onclick="addSession()">Ajouter la session</button>
    </div>

    <div class="admin-section">
      <h4>Sessions à venir (${sorted.length})</h4>
      ${sorted.length===0?'<p style="font-size:.85rem;opacity:.6">Aucune session créée.</p>':''}
      ${sorted.map(s=>`
        <div class="session-list-item">
          <div>
            <div style="font-weight:600;color:var(--burgundy)">${s.type}</div>
            <div style="opacity:.65;font-size:.8rem">${parseDate(s.date).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})} à ${s.time} · ${s.lieu}</div>
            <div style="font-size:.78rem;color:var(--green);margin-top:2px">${s.registrations.length}/${s.maxParticipants} inscrits</div>
          </div>
          <button class="del-btn" onclick="deleteSession('${s.id}')" title="Supprimer">&#215;</button>
        </div>
        ${s.registrations.filter(r=>r.email!=='x@x.fr').map(r=>`
          <div style="padding:.3rem 0 .3rem 1rem;font-size:.75rem;opacity:.6;border-bottom:1px dotted var(--cream-dark)">
            → ${r.prenom} ${r.nom} · ${r.email} · ${r.tel}
          </div>
        `).join('')}
      `).join('')}
    </div>
    <button onclick="adminLoggedIn=false;renderAdminContent()" style="background:none;border:none;color:var(--grey);opacity:.5;cursor:pointer;font-family:var(--font);font-size:.85rem;padding:.5rem 0">Se déconnecter</button>
  `;
  // set today as min date
  document.getElementById('a-date').min=formatDate(new Date());
}

function addSession(){
  const type=document.getElementById('a-type').value.trim();
  const date=document.getElementById('a-date').value;
  const time=document.getElementById('a-time').value;
  const lieu=document.getElementById('a-lieu').value.trim();
  const gmaps=document.getElementById('a-gmaps').value.trim();
  const max=parseInt(document.getElementById('a-max').value)||10;

  if(!type||!date||!time||!lieu){showToast('Merci de remplir tous les champs','error');return;}

  const s={id:'s'+Date.now(),date,time,lieu,gmaps,maxParticipants:max,registrations:[],type};
  sessions.push(s);
  saveSessions();
  renderCalendar();
  renderWeek();
  renderAdminPanel(document.getElementById('admin-content'));
  showToast('Session ajoutée avec succès !');
}

function deleteSession(id){
  if(!confirm('Supprimer cette session ?'))return;
  sessions=sessions.filter(s=>s.id!==id);
  saveSessions();
  renderCalendar();
  renderWeek();
  renderAdminPanel(document.getElementById('admin-content'));
  showToast('Session supprimée');
}

/* ════════════════════════════════
   TOAST NOTIFICATION
═══════════════════════════════════ */
let toastTimer=null;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(type==='error'?' error':'');
  setTimeout(()=>t.classList.add('show'),10);
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}


/* ════════════════════════════════
   VUE SEMAINE (mobile)
═══════════════════════════════════ */
let weekStart = getMonday(new Date());

function getMonday(d){
  const day=d.getDay(), diff=d.getDate()-day+(day===0?-6:1);
  return new Date(d.getFullYear(),d.getMonth(),diff);
}

function changeWeek(dir){
  weekStart=addDays(weekStart,dir*7);
  renderWeek();
}

function renderWeek(){
  const wg=document.getElementById('week-grid');
  if(!wg)return;
  wg.innerHTML='';
  const today=formatDate(new Date());
  const endDay=addDays(weekStart,6);

  // Title
  const opts={day:'numeric',month:'long'};
  const t1=weekStart.toLocaleDateString('fr-FR',opts);
  const t2=endDay.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('week-title').textContent=t1+' – '+t2;

  for(let i=0;i<7;i++){
    const day=addDays(weekStart,i);
    const dateStr=formatDate(day);
    const isToday=dateStr===today;
    const dayName=day.toLocaleDateString('fr-FR',{weekday:'long'});
    const dayDate=day.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});

    const block=document.createElement('div');
    block.className='week-day-block';

    const header=document.createElement('div');
    header.className='week-day-header'+(isToday?' today-header':'');
    header.innerHTML=`<span style="text-transform:capitalize">${dayName}</span><span class="week-day-date">${dayDate}</span>`;
    block.appendChild(header);

    const sessionsDiv=document.createElement('div');
    sessionsDiv.className='week-day-sessions';

    const daySessions=sessions.filter(s=>s.date===dateStr);
    if(daySessions.length===0){
      const empty=document.createElement('div');
      empty.className='week-empty';
      empty.textContent='Pas de séance';
      sessionsDiv.appendChild(empty);
    } else {
      daySessions.forEach(s=>{
        const isFull=s.registrations.length>=s.maxParticipants;
        const card=document.createElement('div');
        card.className='week-session-card'+(isFull?' full':'');
        card.innerHTML=`<div class="wsc-type">${s.type}</div>
          <div class="wsc-meta">⏰ ${s.time} &nbsp;·&nbsp; 📍 ${s.lieu} &nbsp;·&nbsp; ${s.registrations.length}/${s.maxParticipants} inscrits${isFull?' · <strong>Complet</strong>':''}</div>`;
        if(!isFull) card.onclick=()=>openBooking(s.id);
        sessionsDiv.appendChild(card);
      });
    }
    block.appendChild(sessionsDiv);
    wg.appendChild(block);
  }
}

/* ════ INIT ════ */
renderCalendar();
renderWeek();
</script>
